    <source src="audio/click.mp3" type="audio/mpeg">
</audio>
<body>

<div class="stars"></div>

<nav class="navbar">

    <h2 class="logo">🚀 Solar Explorer</h2>

    <div class="nav-right">

        <a href="index.html" class="btn-nav">
            🏠 Beranda
        </a>

        <a href="planet.html" class="btn-nav">
            🪐 Planet

        <a href="tentang.html" class="btn-nav">
            📖 Tentang

        <button
            id="music-btn"
            class="music-btn"
            onclick="toggleMusic()">

            ▶ Musik
        </button>

    </div>

</nav>

<section class="planet-page">

<h1>Pilih Planet</h1>

<div class="planet-buttons">

    <button onclick="showPlanet('merkurius', this)">☿ Merkurius</button>

<button onclick="showPlanet('venus', this)">♀ Venus</button>

<button class="active-planet"
onclick="showPlanet('bumi', this)">
🌍 Bumi
</button>

<button onclick="showPlanet('mars', this)">♂ Mars</button>

<button onclick="showPlanet('jupiter', this)">♃ Jupiter</button>

<button onclick="showPlanet('saturnus', this)">🪐 Saturnus</button>

<button onclick="showPlanet('uranus', this)">⛢ Uranus</button>

<button onclick="showPlanet('neptunus', this)">♆ Neptunus</button>
</div>

<div class="planet-card">

    <img id="planet-img" src="images/bumi.jpg" alt="Planet">

    <h2 id="planet-name">Bumi</h2>

    <p id="planet-description">
        Bumi adalah satu-satunya planet yang diketahui mendukung kehidupan.
    </p>

    <ul id="planet-data">
        <li>Diameter: 12.742 km</li>
        <li>Jumlah Satelit: 1</li>
        <li>Jarak ke Matahari: 149,6 juta km</li>
    </ul>

    <div class="fact-box">

        <h3>Fakta Menarik</h3>

        <p id="planet-fact">
            71% permukaan Bumi tertutup air.
        </p>

    </div>

</div>
</section>

<script src="js/script.js"></script>

</body>
